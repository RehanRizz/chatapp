<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
  <div class="bg-slate-800 p-8 rounded-xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-semibold text-white mb-6 text-center">Private Chat Login</h1>

    {% if error %}
      <div class="mb-4 text-sm text-red-400">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-slate-200 mb-1">Username</label>
        <input
          name="username"
          type="text"
          class="w-full px-3 py-2 rounded-md bg-slate-700 text-white"
          placeholder="alice"
          required
        />
      </div>

      <div>
        <label class="block text-slate-200 mb-1">Password</label>
        <input
          name="password"
          type="password"
          class="w-full px-3 py-2 rounded-md bg-slate-700 text-white"
          placeholder="••••••••"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 text-white font-medium"
      >
        Enter Chat
      </button>
    </form>

    <p class="mt-4 text-xs text-slate-400 text-center">
      Only whitelisted usernames can log in.
    </p>
  </div>
</body>
</html>
